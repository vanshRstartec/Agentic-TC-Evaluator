<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Test Execution Report · rSTAR Technologies</title>
<!--
  rSTAR Test Execution Report — template
  ──────────────────────────────────────
  This file is filled in by build_report() in mainframe.py.
  Edit the markup / CSS freely; just keep the placeholder tokens below intact.

  Tokens replaced at generation time:
    {{HEADLINE}}     — test plan title (falls back to "Test Execution Report")
    {{PLAN_ID}}      — ADO test plan id
    {{SUITE_ID}}     — ADO test suite id
    {{GENERATED_AT}} — timestamp string
    {{TOTAL}}        — total test case count
    {{PASS}} {{FAIL}} {{NA}}           — per-result counts
    {{PASS_PCT}} {{FAIL_PCT}} {{NA_PCT}} — ratio-bar widths (numbers, no % sign)
    {{CASES}}        — generated per-test-case card HTML

  The rSTAR logo is hardcoded below — replace <RSTAR_LOGO_URL> with the logo URL.
-->
<style>
  :root{
    --rstar-blue:#2f6df6;--rstar-blue-dark:#1f4fd0;
    --ink:#1e2433;--ink-soft:#5a6478;--ink-faint:#8a93a6;
    --line:#e8ebf1;--line-soft:#f0f2f7;--bg:#f4f6fb;--card:#ffffff;
    --pass:#1f9d6b;--pass-bg:#e7f6ef;--fail:#d64545;--fail-bg:#fdecec;
    --na:#c08a1e;--na-bg:#fbf3e0;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,Roboto,sans-serif;
    font-size:15px;line-height:1.6}
  .topbar{background:linear-gradient(90deg,var(--rstar-blue),var(--rstar-blue-dark));
    color:#fff;padding:0 48px;height:84px;display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:14px}
  .logo-img{height:40px;width:auto;display:block}
  .topbar .title{font-size:19px;font-weight:600;letter-spacing:.3px}
  .wrap{max-width:1080px;margin:0 auto;padding:40px 48px 64px}
  .head-card{background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:32px 36px;margin-bottom:28px}
  .head-card h1{margin:0;font-size:24px;font-weight:700;letter-spacing:.2px}
  .head-card .meta{color:var(--ink-soft);font-size:14px;margin-top:8px;
    display:flex;flex-wrap:wrap;gap:8px 18px;align-items:center}
  .head-card .meta .dot{width:4px;height:4px;border-radius:50%;background:var(--ink-faint);display:inline-block}
  .head-card .meta b{color:var(--ink);font-weight:600}
  .ratio{display:flex;height:10px;border-radius:8px;overflow:hidden;margin-top:24px;background:var(--line)}
  .ratio i{display:block;height:100%}
  .ratio .p{background:var(--pass)}.ratio .f{background:var(--fail)}.ratio .n{background:var(--na)}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:28px}
  .tile{background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:24px 26px;display:flex;flex-direction:column;gap:6px}
  .tile .n{font-size:38px;font-weight:800;line-height:1;letter-spacing:-1px}
  .tile .k{font-size:12px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink-faint)}
  .tile.total .n{color:var(--rstar-blue)}.tile.pass .n{color:var(--pass)}
  .tile.fail .n{color:var(--fail)}.tile.na .n{color:var(--na)}
  .filters{display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap}
  .filters button{border:1px solid var(--line);background:var(--card);border-radius:10px;
    padding:9px 18px;font-size:14px;font-weight:600;cursor:pointer;color:var(--ink-soft);
    font-family:inherit;transition:all .15s}
  .filters button:hover{border-color:#cdd4e2}
  .filters button.active{background:var(--rstar-blue);color:#fff;border-color:var(--rstar-blue)}
  .case{background:var(--card);border:1px solid var(--line);border-radius:16px;
    margin-bottom:16px;overflow:hidden;transition:border-color .15s}
  .case:hover{border-color:#d6dceb}
  .case-head{width:100%;display:flex;align-items:center;gap:16px;padding:22px 28px;
    background:none;border:0;cursor:pointer;text-align:left;font-family:inherit}
  .case-head .chev{color:var(--ink-faint);font-size:13px;transition:transform .18s;flex-shrink:0}
  .case.open .case-head .chev{transform:rotate(90deg)}
  .badge{font-size:12px;font-weight:700;padding:5px 13px;border-radius:8px;flex-shrink:0;
    text-transform:uppercase;letter-spacing:.5px;min-width:62px;text-align:center}
  .badge.pass{background:var(--pass-bg);color:var(--pass)}
  .badge.fail{background:var(--fail-bg);color:var(--fail)}
  .badge.na{background:var(--na-bg);color:var(--na)}
  .tc-id{font-family:'Consolas',ui-monospace,monospace;font-size:13px;color:var(--ink-faint);flex-shrink:0}
  .tc-title{font-weight:600;font-size:16px;flex:1;letter-spacing:.1px}
  .case-body{display:none;padding:4px 28px 28px}
  .case.open .case-body{display:block}
  .divider{height:1px;background:var(--line-soft);margin:0 0 22px}
  .lbl{font-size:12px;font-weight:700;color:var(--ink-faint);
    text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
  .reason{background:var(--bg);border-radius:12px;padding:18px 20px;margin-bottom:24px;
    color:var(--ink);font-size:15px}
  .reason.fail-tone{background:var(--fail-bg)}.reason.pass-tone{background:var(--pass-bg)}
  .ev-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
  .ev{display:block;border:1px solid var(--line);border-radius:12px;overflow:hidden;
    text-decoration:none;color:var(--ink-soft);transition:all .15s;background:var(--card)}
  .ev:hover{border-color:var(--rstar-blue);transform:translateY(-2px)}
  .ev img,.ev video{width:100%;height:148px;object-fit:cover;display:block;background:var(--line-soft)}
  .ev-name{display:block;font-size:12px;padding:10px 12px;font-family:'Consolas',ui-monospace,monospace;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-top:1px solid var(--line-soft)}
  .no-ev{color:var(--ink-faint);font-style:italic;font-size:14px;margin:0}
  footer{text-align:center;color:var(--ink-faint);font-size:13px;margin-top:40px}
  @media(max-width:720px){
    .topbar{padding:14px 20px;height:auto;flex-direction:column;gap:6px;text-align:center}
    .wrap{padding:24px 18px 40px}
    .stats{grid-template-columns:repeat(2,1fr)}
    .head-card,.case-head,.case-body{padding-left:20px;padding-right:20px}
  }
</style>
</head>

  <div class="wrap">

    <div class="head-card">
      <h1>{{HEADLINE}}</h1>
      <div class="meta">
        <span><b>Plan</b> #{{PLAN_ID}}</span><span class="dot"></span>
        <span><b>Suite</b> #{{SUITE_ID}}</span><span class="dot"></span>
        <span>{{GENERATED_AT}}</span><span class="dot"></span>
        <span>Executed by <b>Evaluator Agent</b></span>
      </div>
      <div class="ratio">
        <i class="p" style="width:{{PASS_PCT}}%"></i>
        <i class="f" style="width:{{FAIL_PCT}}%"></i>
        <i class="n" style="width:{{NA_PCT}}%"></i>
      </div>
    </div>

    <div class="stats">
      <div class="tile total"><span class="n">{{TOTAL}}</span><span class="k">Total</span></div>
      <div class="tile pass"><span class="n">{{PASS}}</span><span class="k">Passed</span></div>
      <div class="tile fail"><span class="n">{{FAIL}}</span><span class="k">Failed</span></div>
      <div class="tile na"><span class="n">{{NA}}</span><span class="k">N/A</span></div>
    </div>

    <div class="filters">
      <button class="active" onclick="flt(this,'all')">All ({{TOTAL}})</button>
      <button onclick="flt(this,'pass')">Passed ({{PASS}})</button>
      <button onclick="flt(this,'fail')">Failed ({{FAIL}})</button>
      <button onclick="flt(this,'na')">N/A ({{NA}})</button>
    </div>
    {{CASES}}

    <footer>Generated by rSTAR Evaluator Agent · AI-Powered QA Automation</footer>

  </div>

<script>
  function toggle(btn){ btn.parentElement.classList.toggle('open'); }
  function flt(btn,k){
    document.querySelectorAll('.filters button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.case').forEach(c=>{
      c.style.display = (k==='all'||c.dataset.result===k) ? '' : 'none';
    });
  }
</script>
</body>
</html>
