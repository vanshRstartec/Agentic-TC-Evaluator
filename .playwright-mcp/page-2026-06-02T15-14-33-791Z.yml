            - paragraph [ref=e322]:
              - paragraph [ref=e323]: "To explain Budget Billing and enroll a customer, follow these steps:"
              - list [ref=e324]:
                - listitem [ref=e325]:
                  - paragraph [ref=e326]:
                    - strong [ref=e327]: "Budget Bill Script:"
                    - text: “Mr. or Mrs. (insert customer’s name) the purpose of budget billing is to level out your bills. This it is not a savings plan and not based upon a customer’s income. The initial budget bill amount is the average billed revenue of the address over the last 12 months. Every three months, the budget amount is reviewed and could increase, decrease or remain the same depending on the energy usage pattern at the home. The decision of the review displays in the Message Center of your bill if there is a change in Budget Billing amount”
                - listitem [ref=e328]:
                  - paragraph [ref=e329]:
                    - strong [ref=e330]: "Who is eligible:"
                    - text: Residential customers with an active PECO account are eligible when the account balance is current.
                - listitem [ref=e331]:
                  - paragraph [ref=e332]:
                    - strong [ref=e333]: "When enrollment starts:"
                    - text: Enrollment may occur at any time. Budget Billing will begin with the next bill cycle after enrollment.
                - listitem [ref=e334]:
                  - paragraph [ref=e335]:
                    - strong [ref=e336]: "How amount is calculated:"
                    - text: The monthly budget amount is the average billed revenue over the last 12 months. If no 12 months exist, estimate using previous tenant usage or system default annual base.
                - listitem [ref=e337]:
                  - paragraph [ref=e338]:
                    - strong [ref=e339]: "Review frequency:"
                    - text: The budget amount is reviewed every three months and may be adjusted to match usage.
                - listitem [ref=e340]:
                  - paragraph [ref=e341]:
                    - strong [ref=e342]: "Settlement and options:"
                    - text: "After 12 months the budget resets and a settlement occurs. Two settlement options:"
                  - list [ref=e343]:
                    - listitem [ref=e344]: "Apply option: True-up once every 12 months; credits or debits are applied or billed."
                    - listitem [ref=e345]: "Roll Over option: Debit balances roll over and are spread over next year’s budget payments."
                - listitem [ref=e346]:
                  - paragraph [ref=e347]:
                    - strong [ref=e348]: "Important change for multiple services:"
                    - text: If electric and gas both enrolled, each service tracks its own budget and deferred balance. Credits are applied to the account; only amounts owed roll over.
                - listitem [ref=e349]:
                  - paragraph [ref=e350]:
                    - strong [ref=e351]: "Customer responsibilities:"
                    - text: Customer remains responsible for current billing charges. Current bill must be paid before Budget Billing starts. If customer unenrolls, they will pay regular monthly charges and any balance difference on next bill.
                - listitem [ref=e352]:
                  - paragraph [ref=e353]:
                    - strong [ref=e354]: "How to enroll (CC&B):"
                  - list [ref=e355]:
                    - listitem [ref=e356]: In Account page, click the Budget tab.
                    - listitem [ref=e357]: Select applicable Budget Plan from the Budget Plan dropdown.
                    - listitem [ref=e358]: Click Recommend Budget.
                    - listitem [ref=e359]: Advise customer of recommended budget amount.
                    - listitem [ref=e360]: If customer agrees, click Save.
                    - listitem [ref=e361]: Leave a Budget Billing customer contact with enrollment date, budget amount, name, and account number.
                    - listitem [ref=e362]: "Note: Do not initiate budget for delinquent accounts. Transfer Active Collections accounts to Financial Call Center or CAP; credit-trained agents will address past due balance and place on budget."
                - listitem [ref=e363]:
                  - paragraph [ref=e364]:
                    - strong [ref=e365]: "How to enroll (CX Wrapper / CX 360 View):"
                  - list [ref=e366]:
                    - listitem [ref=e367]: From CX 360 View, navigate to Enrolled Programs.
                    - listitem [ref=e368]: Click Budget Billing link and review Budget Billing history.
                    - listitem [ref=e369]: Press View Current Bill if needed.
                    - listitem [ref=e370]: Determine eligibility and run the amount they would pay.
                    - listitem [ref=e371]: If proceeding, in Budget window press Process Budget Billing or Stop Budget Billing as appropriate.
                    - listitem [ref=e372]: Provide BB amount and explain stop will take effect next billing cycle.
                - listitem [ref=e373]:
                  - paragraph [ref=e374]:
                    - strong [ref=e375]: "Adjusting or stopping Budget Billing:"
                  - list [ref=e376]:
                    - listitem [ref=e377]: From Account page Budget tab, Update Budget Billing to edit amounts.
                    - listitem [ref=e378]: To stop, press Stop Budget Billing or Cancel Budget; system saves change automatically.
                    - listitem [ref=e379]: If both gas and electric budgets exist, cancel each service separately to fully remove Budget Billing.
                - listitem [ref=e380]:
                  - paragraph [ref=e381]:
                    - strong [ref=e382]: "Payment and credits:"
                    - text: If customer pays more than budget amount, excess applies as credit to next month’s budget.
                - listitem [ref=e383]:
                  - paragraph [ref=e384]:
                    - strong [ref=e385]: "Where to find details on bill:"
                    - text: Settlement month, Budget Difference, and Budget status appear on bill second page under Status of Your Budget Billing Plan.
                - listitem [ref=e386]:
                  - paragraph [ref=e387]:
                    - strong [ref=e388]: "Advise about changes:"
                    - text: Inform customer that lowering monthly budget amount could increase settlement amount. Account will be reviewed again in three months.
